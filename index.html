<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>乐龄学院选课助手 Demo</title>
  <style>
    :root {
      --bg: #f6f7f2;
      --paper: #ffffff;
      --ink: #17211b;
      --muted: #607064;
      --line: #dfe6da;
      --green: #4f8f45;
      --green-2: #e8f3e4;
      --gold: #d89b34;
      --red: #c8483c;
      --blue: #3c78a8;
      --shadow: 0 16px 44px rgba(29, 50, 33, .11);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #f9fbf5 0%, var(--bg) 44%, #eef4ec 100%);
      letter-spacing: 0;
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, .92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .topbar-inner {
      max-width: 1240px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--green);
      border-radius: 8px;
      font-weight: 800;
      flex: 0 0 auto;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .brand p {
      margin: 3px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    .summary {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .summary strong {
      color: var(--ink);
      font-size: 18px;
    }

    main {
      max-width: 980px;
      width: 100%;
      margin: 0 auto;
      padding: 18px 20px 22px;
    }

    .start-page {
      min-height: calc(100vh - 70px);
      display: grid;
      place-items: center;
    }

    .start-card {
      width: min(100%, 520px);
      padding: 28px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .start-card h2 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.25;
    }

    .start-card p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .entry-options {
      display: grid;
      gap: 12px;
      margin-bottom: 22px;
    }

    .entry-option {
      width: 100%;
      min-height: 66px;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfa;
      color: var(--ink);
      text-align: left;
      font-weight: 800;
      transition: .16s ease;
    }

    .entry-option::before {
      content: "";
      width: 20px;
      height: 20px;
      border: 2px solid #b9c8b3;
      border-radius: 50%;
      background: #fff;
      box-shadow: inset 0 0 0 5px #fff;
    }

    .entry-option:hover {
      border-color: #b7c8b1;
      background: #f3f8f0;
    }

    .entry-option.active {
      border-color: var(--green);
      background: var(--green-2);
      color: var(--ink);
      box-shadow: 0 10px 24px rgba(79, 143, 69, .14);
    }

    .entry-option.active::before {
      border-color: var(--green);
      background: var(--green);
    }

    .next-button {
      width: 100%;
      min-height: 48px;
      border-radius: 8px;
      background: var(--green);
      color: #fff;
      font-weight: 900;
      font-size: 16px;
      transition: .16s ease;
    }

    .next-button:disabled {
      cursor: not-allowed;
      background: #dfe6da;
      color: #7c897f;
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      align-items: start;
    }

    .hidden {
      display: none !important;
    }

    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .filters {
      position: sticky;
      top: 82px;
      max-height: calc(100vh - 102px);
      overflow: auto;
      padding: 18px;
      scroll-margin-top: 88px;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 16px;
      line-height: 1.35;
    }

    .hint {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .field {
      margin: 0 0 20px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 14px;
    }

    .field-note {
      margin: -2px 0 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .choice-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .choice {
      min-height: 38px;
      border: 1px solid var(--line);
      background: #fbfcfa;
      border-radius: 8px;
      padding: 8px 11px;
      color: var(--ink);
      transition: .16s ease;
    }

    .choice:hover {
      border-color: #b7c8b1;
      background: #f3f8f0;
    }

    .choice.active {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
      box-shadow: 0 8px 18px rgba(79, 143, 69, .24);
    }

    .reset {
      width: 100%;
      height: 42px;
      border-radius: 8px;
      background: #eef2eb;
      color: var(--ink);
      font-weight: 700;
    }

    .wizard {
      min-height: calc(100vh - 108px);
      padding: 22px;
      display: grid;
      align-content: start;
      gap: 16px;
    }

    .wizard-head {
      display: grid;
      gap: 6px;
    }

    .wizard-step {
      color: var(--green);
      font-size: 14px;
      font-weight: 900;
    }

    .wizard-head h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.25;
    }

    .wizard-head p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .wizard-section {
      display: grid;
      gap: 10px;
    }

    .wizard-section h3 {
      margin: 0;
      font-size: 17px;
      line-height: 1.35;
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(138px, 1fr));
      gap: 10px;
    }

    .option-card {
      min-height: 52px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfa;
      color: var(--ink);
      text-align: left;
      display: grid;
      gap: 5px;
      transition: .16s ease;
    }

    .option-card:hover {
      border-color: #b7c8b1;
      background: #f3f8f0;
    }

    .option-card.active {
      border-color: var(--green);
      background: var(--green-2);
      box-shadow: 0 10px 22px rgba(79, 143, 69, .14);
    }

    .option-card strong {
      font-size: 16px;
      line-height: 1.35;
    }

    .option-card span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .course-option-grid {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .wizard-nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 0;
    }

    .wizard-btn {
      min-height: 46px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 900;
      background: #eef2eb;
      color: var(--ink);
    }

    .wizard-btn.primary {
      background: var(--green);
      color: #fff;
    }

    .wizard-btn:disabled {
      cursor: not-allowed;
      background: #dfe6da;
      color: #7c897f;
    }

    .content {
      display: grid;
      gap: 14px;
      scroll-margin-top: 88px;
    }

    .guide {
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      background: #fff;
    }

    .guide h2 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.25;
    }

    .guide p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .count-box {
      min-width: 132px;
      padding: 14px;
      border-radius: 8px;
      background: var(--green-2);
      text-align: center;
    }

    .count-box strong {
      display: block;
      font-size: 32px;
      line-height: 1;
      color: var(--green);
    }

    .count-box span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .interest-strip {
      padding: 16px;
      overflow: hidden;
    }

    .interest-strip .choice-grid {
      max-height: 132px;
      overflow: auto;
      padding-right: 4px;
    }

    .courses {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .course {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .course.focused {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(79, 143, 69, .18), var(--shadow);
    }

    .course.conflict {
      border-color: rgba(200, 72, 60, .45);
      background: #fffafa;
    }

    .course-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }

    .course h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
    }

    .tag {
      flex: 0 0 auto;
      max-width: 108px;
      padding: 5px 8px;
      border-radius: 8px;
      color: var(--green);
      background: var(--green-2);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meta {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .meta strong {
      color: var(--ink);
      font-weight: 700;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .add {
      flex: 1;
      min-height: 42px;
      border-radius: 8px;
      background: var(--green);
      color: #fff;
      font-weight: 800;
    }

    .add.added {
      background: #e5efe1;
      color: var(--green);
    }

    .add.blocked {
      background: #f7e5e2;
      color: var(--red);
    }

    .conflict-note {
      color: var(--red);
      font-size: 13px;
      line-height: 1.45;
    }

    .alternatives {
      display: grid;
      gap: 8px;
      padding: 10px;
      border-radius: 8px;
      background: #fff4f2;
      border: 1px solid rgba(200, 72, 60, .16);
    }

    .alternatives-title {
      color: var(--red);
      font-size: 13px;
      font-weight: 800;
    }

    .alternative {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .alternative strong {
      display: block;
      color: var(--ink);
      font-size: 13px;
    }

    .alt-add {
      min-height: 32px;
      padding: 0 10px;
      border-radius: 8px;
      background: #fff;
      color: var(--green);
      border: 1px solid #c9dcc3;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .empty {
      padding: 36px 20px;
      text-align: center;
      color: var(--muted);
    }

    .plan {
      position: sticky;
      top: 82px;
      padding: 18px;
      max-height: calc(100vh - 102px);
      overflow: auto;
      scroll-margin-top: 88px;
    }

    .plan.plan-full {
      position: static;
      max-height: none;
      overflow: visible;
      width: min(100%, 760px);
      margin: 0 auto;
    }

    .plan-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .plan-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .clear {
      color: var(--muted);
      background: transparent;
      padding: 6px 0;
      font-size: 13px;
    }

    .home-btn {
      width: 100%;
      min-height: 48px;
      margin-top: 8px;
      border-radius: 8px;
      background: #eef2eb;
      color: var(--green);
      font-size: 16px;
      font-weight: 800;
    }

    .notice {
      margin: 0 0 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #f5f7f3;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .selected-list {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .selected {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfa;
    }

    .selected strong {
      display: block;
      font-size: 15px;
      line-height: 1.35;
      margin-bottom: 6px;
    }

    .selected span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .remove {
      margin-top: 8px;
      color: var(--red);
      background: transparent;
      font-size: 13px;
      padding: 0;
    }

    .plan-home-section,
    .result-section {
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .plan-home-section {
      margin-top: 6px;
    }

    .result-section {
      margin-top: 14px;
    }

    .result-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 0 0 10px;
    }

    .result-btn {
      min-height: 40px;
      border-radius: 8px;
      background: var(--green);
      color: #fff;
      font-weight: 800;
    }

    .result-btn.secondary {
      background: #eef2eb;
      color: var(--ink);
    }

    .result-box {
      display: none;
      margin: 0 0 16px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fbfcfa;
      white-space: pre-wrap;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.6;
    }

    .result-box.show {
      display: grid;
      gap: 10px;
    }

    .result-image {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      display: block;
    }

    .result-note {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .week {
      display: grid;
      gap: 8px;
    }

    .day {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .day-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 10px;
      background: #f0f5ed;
      font-weight: 800;
    }

    .day-title span {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    .slot {
      padding: 9px 10px;
      border-top: 1px solid var(--line);
      font-size: 13px;
      line-height: 1.45;
    }

    .slot b {
      display: block;
      font-size: 14px;
    }

    .slot em {
      color: var(--muted);
      font-style: normal;
    }

    .slot-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
    }

    .slot-remove {
      min-height: 28px;
      padding: 0 8px;
      border-radius: 8px;
      background: #f7e5e2;
      color: var(--red);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .mobile-nav {
      display: none;
    }

    .course-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: end;
      background: rgba(23, 33, 27, .28);
    }

    .course-modal.open {
      display: flex;
    }

    .course-modal-sheet {
      width: 100%;
      max-height: min(76vh, 680px);
      padding: 16px 16px calc(18px + env(safe-area-inset-bottom));
      border-radius: 16px 16px 0 0;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 -20px 46px rgba(23, 33, 27, .16);
      overflow: auto;
    }

    .course-modal-head {
      position: sticky;
      top: -16px;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 2px 0 12px;
      background: #fff;
    }

    .course-modal-head h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .course-modal-head p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .modal-close {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: #eef2eb;
      color: var(--ink);
      font-size: 22px;
      line-height: 1;
    }

    .modal-course-list {
      display: grid;
      gap: 9px;
    }

    .modal-course {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfa;
      text-align: left;
      color: var(--ink);
    }

    .modal-course strong {
      display: block;
      margin-bottom: 5px;
      font-size: 16px;
      line-height: 1.35;
    }

    .modal-course span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 1080px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .plan {
        position: static;
        max-height: none;
      }
    }

    @media (max-width: 760px) {
      .topbar-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      .summary {
        width: 100%;
        justify-content: space-between;
      }

      main {
        padding: 12px;
      }

      .start-page {
        min-height: calc(100vh - 118px);
      }

      .start-card {
        padding: 20px;
      }

      .start-card h2 {
        font-size: 23px;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .wizard {
        min-height: calc(100vh - 104px);
        padding: 16px;
        gap: 13px;
      }

      .wizard-head h2 {
        font-size: 22px;
      }

      .wizard-head p {
        font-size: 13px;
      }

      .wizard-section h3 {
        font-size: 16px;
      }

      .option-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .course-option-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .option-card {
        min-height: 48px;
        padding: 9px 10px;
      }

      .option-card strong {
        font-size: 15px;
      }

      .option-card span {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .wizard-btn {
        min-height: 44px;
      }

      .filters {
        position: static;
        max-height: none;
      }

      .guide {
        grid-template-columns: 1fr;
      }

      .guide h2 {
        font-size: 21px;
      }

      .courses {
        grid-template-columns: 1fr;
      }

      .mobile-nav {
        display: none;
      }

      .mobile-nav button {
        min-height: 44px;
        border-radius: 8px;
        background: #eef2eb;
        color: var(--ink);
        font-size: 14px;
        font-weight: 800;
      }

      .mobile-nav button.primary {
        background: var(--green);
        color: #fff;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-mark">选</div>
          <div>
            <h1>乐龄学院选课助手</h1>
            <p>2026年秋季课表 Demo · 选择入口，再继续选课</p>
          </div>
        </div>
        <div class="summary">

    const $ = selector => document.querySelector(selector);

    function jumpTo(targetId) {
      const target = document.getElementById(targetId);
      if (!target) return;
      target.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function toMinutes(value) {
      const [hour, minute] = value.split(":").map(Number);
      return hour * 60 + minute;
    }

    function timeRange(course) {
      const [start, end] = course.time.split("-");
      return { start: toMinutes(start), end: toMinutes(end) };
    }

    function slotRange(period) {
      return { start: toMinutes(period.start), end: toMinutes(period.end) };
    }

    function overlaps(a, b) {
      return a.start < b.end && a.end > b.start;
    }

    function hasConflict(course, selectedCourses = getSelectedCourses()) {
      return selectedCourses.find(item => {
        if (item.id === course.id || item.weekday !== course.weekday) return false;
        const a = timeRange(course);
        const b = timeRange(item);
        return overlaps(a, b);
      });
    }

    function getSelectedCourses() {
      return courses.filter(course => state.selected.has(course.id));
    }

    function selectedCourse() {
      return courses.find(course => course.id === state.chosenCourseId);
    }

    function sortedUnique(key) {
      return [...new Set(courses.map(course => course[key]))].sort((a, b) => a.localeCompare(b, "zh-Hans-CN"));
    }

    function uniqueInOrder(items) {
      return [...new Set(items.filter(Boolean))];
    }

    function sortCourses(items) {
      return [...items].sort((a, b) => {
        const dayDiff = weekdays.indexOf(a.weekday) - weekdays.indexOf(b.weekday);
        if (dayDiff) return dayDiff;
        return timeRange(a).start - timeRange(b).start;
      });
    }

    function courseTuition(course) {
      return tuitionById[course.id] || 0;
    }

    function tuitionText(course) {
      const tuition = courseTuition(course);
      return tuition ? `${tuition}元` : "待确认";
    }

    function totalTuition(selected) {
      return selected.reduce((sum, course) => sum + courseTuition(course), 0);
    }

    function teacherNames(course) {
      return course.teacher
        .replace(/（.*?）/g, "")
        .split(/[、\s]+/)
        .map(name => name.trim())
        .filter(Boolean);
    }

    function departments() {
      return uniqueInOrder(courses.map(course => course.department));
    }

    function interestsByDepartment(department) {
      return uniqueInOrder(courses.filter(course => course.department === department).map(course => course.interest));
    }

    function teachersByDepartment(department) {
      return uniqueInOrder(courses
        .filter(course => course.department === department)
        .flatMap(course => teacherNames(course)))
        .sort((a, b) => a.localeCompare(b, "zh-Hans-CN"));
    }

    function courseHasTeacher(course, teacher) {
      return teacherNames(course).includes(teacher);
    }

    function timeFilteredCourses() {
      const period = periods.find(item => item.key === state.timePeriod);
      if (!state.timeDay || !period) return [];
      return sortCourses(courses.filter(course => (
        course.weekday === state.timeDay && overlaps(timeRange(course), slotRange(period))
      )));
    }

    function interestFilteredCourses() {
      if (!state.department || !state.interest) return [];
      return sortCourses(courses.filter(course => (
        course.department === state.department && course.interest === state.interest
      )));
    }

    function teacherFilteredCourses() {
      if (!state.department || !state.teacher) return [];
      return sortCourses(courses.filter(course => (
        course.department === state.department && courseHasTeacher(course, state.teacher)
      )));
    }

    function optionButton({ key, title, detail, active, onClick }) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `option-card ${active ? "active" : ""}`;
      button.setAttribute("role", "radio");
      button.setAttribute("aria-checked", String(active));
      button.innerHTML = `<strong>${title}</strong>${detail ? `<span>${detail}</span>` : ""}`;
      button.addEventListener("click", () => onClick(key));
      return button;
    }

    function renderOptionGrid(container, items, selectedKey, onClick, courseMode = false) {
      container.innerHTML = "";
      container.className = `option-grid ${courseMode ? "course-option-grid" : ""}`;
      items.forEach(item => {
        const key = typeof item === "string" ? item : item.key;
        const title = typeof item === "string" ? item : item.title;
        const detail = typeof item === "string" ? "" : item.detail;
        container.appendChild(optionButton({
          key,
          title,
          detail,
          active: String(selectedKey) === String(key),
          onClick
        }));
      });
    }

    function courseOptions(items) {
      return items.map(course => ({

        detail: `周${course.weekday} ${course.time} · ${course.teacher} · ${course.classroom}`
      }));

    function renderPlan() {
      const selected = sortCourses(getSelectedCourses());
      $("#selectedCount").textContent = selected.length;
      $("#planNotice").textContent = selected.length
        ? "下面是你当前的选课组合。若有时间冲突，课程卡片会出现红色提醒。"
        : "还没有选择课程。完成选课后，课程会自动加入这里。";

      const selectedList = $("#selectedList");
      selectedList.innerHTML = "";
      selected.forEach(course => {
        const conflict = hasConflict(course, selected);
        const item = document.createElement("div");
        item.className = "selected";
        item.innerHTML = `
          <strong>${course.name}</strong>
          <span>周${course.weekday} ${course.time} · ${course.classroom}</span>
          <span>${course.teacher} · ${course.interest} · 学费：${tuitionText(course)}</span>

          <button class="remove">移除</button>
        `;
        item.querySelector(".remove").addEventListener("click", () => {
          state.selected.delete(course.id);
          state.showResult = false;
          render();

        selectedList.appendChild(item);
      });

      const resultBox = $("#resultBox");
      resultBox.className = `result-box ${state.showResult ? "show" : ""}`;

      weekdays.forEach(day => {

        const dayNode = document.createElement("div");
        dayNode.className = "day";
        dayNode.innerHTML = `

          ${dayCourses.length ? dayCourses.map(course => `
            <div class="slot">
              <div class="slot-row">
                <div>
                  <b>${course.time} ${course.name}</b>
                  <em>${course.classroom} · ${course.interest}</em>
                </div>
                <button class="slot-remove" data-id="${course.id}">删除</button>
              </div>
            </div>
          `).join("") : `<div class="slot"><em>暂未选择</em></div>`}
        `;
        dayNode.querySelectorAll(".slot-remove").forEach(button => {
          button.addEventListener("click", () => {
            state.selected.delete(Number(button.dataset.id));
            state.showResult = false;
            render();
          });
        });
        weekPlan.appendChild(dayNode);
      });
    }

    function buildResultText(selected = sortCourses(getSelectedCourses())) {
      if (!selected.length) return "我的选课清单：\n暂未选择课程。";
      const conflictPairs = new Map();
      selected.forEach(course => {
        const conflict = hasConflict(course, selected);
        if (!conflict) return;
        const key = [course.id, conflict.id].sort((a, b) => a - b).join("-");
        if (!conflictPairs.has(key)) conflictPairs.set(key, `${course.name} 与 ${conflict.name} 时间冲突`);
      });
      const conflictLines = [...conflictPairs.values()];
      const lines = selected.map((course, index) => (
        `${index + 1}. ${course.name}：周${course.weekday} ${course.time}，${course.classroom}，教师：${course.teacher}，学费：${tuitionText(course)}`
      ));
      return [
        "我的选课清单：",
        ...lines,
        "",
        `学费合计：${totalTuition(selected)}元`,
        "",
        conflictLines.length ? "时间提醒：\n" + conflictLines.join("\n") : "当前无时间冲突。"
      ].join("\n");
    }

    function wrapCanvasText(ctx, text, maxWidth) {
      const lines = [];
      let line = "";
      for (const char of text) {
        const testLine = line + char;
        if (ctx.measureText(testLine).width > maxWidth && line) {
          lines.push(line);
          line = char;
        } else {
          line = testLine;
        }
      }
      if (line) lines.push(line);
      return lines;
    }

    function buildResultImageDataUrl(selected = sortCourses(getSelectedCourses())) {
      const width = 1080;
      const padding = 64;
      const cardGap = 28;
      const cardPadding = 32;
      const footerHeight = 116;
      const ctxMeasure = document.createElement("canvas").getContext("2d");
      ctxMeasure.font = "800 44px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
      const courseBlocks = selected.map(course => {
        const nameLines = wrapCanvasText(ctxMeasure, course.name, width - padding * 2 - cardPadding * 2 - 190);
        return { course, nameLines, height: 140 + nameLines.length * 52 };
      });
      const height = Math.max(
        820,
        250 + courseBlocks.reduce((sum, block) => sum + block.height + cardGap, 0) + footerHeight
      );
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#fbfcfa";
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = "#4f8f45";
      ctx.fillRect(0, 0, width, 170);
      ctx.fillStyle = "#fff";
      ctx.font = "800 56px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
      ctx.fillText("我的课表", padding, 82);
      ctx.font = "600 34px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
      ctx.fillText("乐龄学院 2026年秋季学期", padding, 134);

      ctx.fillStyle = "#223024";
      ctx.font = "800 40px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
      ctx.fillText(`共 ${selected.length} 门课`, padding, 226);
      ctx.fillStyle = "#4f8f45";
      ctx.fillText(`学费合计：${totalTuition(selected)}元`, width - padding - 360, 226);

      let y = 266;
      if (!selected.length) {
        ctx.fillStyle = "#6b746a";
        ctx.font = "600 40px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
        ctx.fillText("暂未选择课程", padding, y + 60);
      }

      courseBlocks.forEach((block, index) => {
        const { course, nameLines, height: cardHeight } = block;
        ctx.fillStyle = "#fff";
        ctx.strokeStyle = "#d9e0d4";
        ctx.lineWidth = 2;
        const x = padding;
        const cardWidth = width - padding * 2;
        ctx.beginPath();
        ctx.roundRect(x, y, cardWidth, cardHeight, 18);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#4f8f45";
        ctx.font = "800 34px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
        ctx.fillText(String(index + 1).padStart(2, "0"), x + cardPadding, y + 60);

        ctx.fillStyle = "#223024";
        ctx.font = "800 44px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
        let textY = y + 60;
        nameLines.forEach(line => {
          ctx.fillText(line, x + cardPadding + 78, textY);
          textY += 52;
        });

        ctx.fillStyle = "#6b746a";
        ctx.font = "600 34px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
        ctx.fillText(`周${course.weekday} ${course.time} · ${course.classroom}`, x + cardPadding + 78, textY + 14);
        ctx.fillText(`教师：${course.teacher}`, x + cardPadding + 78, textY + 62);

        ctx.fillStyle = "#8a5a24";
        ctx.font = "800 38px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
        ctx.fillText(`学费 ${tuitionText(course)}`, x + cardWidth - cardPadding - 190, y + 62);

        y += cardHeight + cardGap;
      });

      const conflictPairs = new Map();
      selected.forEach(course => {
        const conflict = hasConflict(course, selected);
        if (!conflict) return;
        const key = [course.id, conflict.id].sort((a, b) => a - b).join("-");
        if (!conflictPairs.has(key)) conflictPairs.set(key, `${course.name} 与 ${conflict.name} 时间冲突`);
      });
      ctx.fillStyle = conflictPairs.size ? "#a33b2f" : "#6b746a";
      ctx.font = "700 32px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
      const reminder = conflictPairs.size ? `时间提醒：${[...conflictPairs.values()].join("；")}` : "时间提醒：当前无时间冲突";
      wrapCanvasText(ctx, reminder, width - padding * 2).forEach((line, index) => {
        ctx.fillText(line, padding, height - 82 + index * 40);
      });

      return canvas.toDataURL("image/png");
    }

    function renderStartPage() {
      $("#startPage").classList.toggle("hidden", state.page !== "start");
      $("#workspace").classList.toggle("hidden", state.page === "start");
      $("#wizardPanel").classList.toggle("hidden", state.page === "start" || state.page === "plan");
      $("#planPanel").classList.toggle("hidden", state.page !== "plan");
      document.querySelector(".summary").classList.add("hidden");
      $("#nextPage").disabled = !state.entryMode;
      document.querySelectorAll(".entry-option").forEach(button => {
        const active = button.dataset.mode === state.entryMode;
        button.classList.toggle("active", active);
        button.setAttribute("aria-checked", String(active));
      });
    }

    function render() {
      renderStartPage();
      if (state.page !== "start") renderWizard();
      renderPlan();
      $("#visibleCount").textContent = state.page === "start" ? courses.length : visibleCountForRoute();
    }

    document.querySelectorAll(".entry-option").forEach(button => {
      button.addEventListener("click", () => {
        state.entryMode = button.dataset.mode;
        renderStartPage();
      });
    });

    $("#nextPage").addEventListener("click", () => {
      if (!state.entryMode) return;
      resetRoute(state.entryMode);
      state.page = "wizard";
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    function visibleCountForRoute() {
      if (state.page === "plan") return getSelectedCourses().length;
      if (state.entryMode === "time" && state.routeStep === 1) return timeFilteredCourses().length;
      if (state.entryMode === "interest" && state.routeStep === 2) return interestFilteredCourses().length;
      if (state.entryMode === "teacher" && state.routeStep === 2) return teacherFilteredCourses().length;
      return courses.length;
    }

    function goBack() {
      if (state.page === "plan") {
        state.page = "wizard";
        render();
        return;
      }

      if (state.routeStep > 0) {
        state.routeStep -= 1;
        state.chosenCourseId = null;
        if (state.entryMode === "interest" && state.routeStep < 1) state.interest = "";
        if (state.entryMode === "teacher" && state.routeStep < 1) state.teacher = "";
        render();
        return;
      }

      state.page = "start";
      render();
    }

    function goNext() {
      if (state.page === "plan") {
        state.page = "start";
        resetRoute("");
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
        return;
      }

      if (state.entryMode === "time") {
        if (state.routeStep === 0 && state.timeDay && state.timePeriod) {
          state.routeStep = 1;
          state.chosenCourseId = null;
          render();
          return;
        }
        if (state.routeStep === 1 && state.chosenCourseId) addChosenCourseToPlan();
        return;
      }

      if (state.entryMode === "interest") {
        if (state.routeStep === 0 && state.department) {
          state.routeStep = 1;
          state.interest = "";
          state.chosenCourseId = null;
          render();
          return;
        }
        if (state.routeStep === 1 && state.interest) {
          state.routeStep = 2;
          state.chosenCourseId = null;
          render();
          return;
        }
        if (state.routeStep === 2 && state.chosenCourseId) addChosenCourseToPlan();
        return;
      }

      if (state.entryMode === "teacher") {
        if (state.routeStep === 0 && state.department) {
          state.routeStep = 1;
          state.teacher = "";
          state.chosenCourseId = null;
          render();
          return;
        }
        if (state.routeStep === 1 && state.teacher) {
          state.routeStep = 2;
          state.chosenCourseId = null;
          render();
          return;
        }
        if (state.routeStep === 2 && state.chosenCourseId) addChosenCourseToPlan();
      }
    }

    $("#clearPlan").addEventListener("click", () => {
      state.selected.clear();
      state.showResult = false;
      render();
    });

    $("#backHomeFromPlan").addEventListener("click", () => {
      state.page = "start";
      resetRoute("");
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    $("#generateResult").addEventListener("click", () => {
      state.showResult = true;
      renderPlan();
    });

    $("#copyResult").addEventListener("click", async () => {
      const text = buildResultText();
      state.showResult = true;
      renderPlan();
      try {
        await navigator.clipboard.writeText(text);
        $("#copyResult").textContent = "已复制";
        setTimeout(() => { $("#copyResult").textContent = "复制文字"; }, 1200);
      } catch (error) {
        $("#copyResult").textContent = "请手动复制";
        setTimeout(() => { $("#copyResult").textContent = "复制文字"; }, 1400);
      }
    });

    render();
  </script>
</body>
</html>
