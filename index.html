<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>乐龄学院选课助手 Demo</title>
  <style>
    :root {
      --bg: #f6f7f2;
      --paper: #ffffff;
      --ink: #17211b;
      --muted: #607064;
      --line: #dfe6da;
      --green: #4f8f45;
      --green-2: #e8f3e4;
      --gold: #d89b34;
      --red: #c8483c;
      --blue: #3c78a8;
      --shadow: 0 16px 44px rgba(29, 50, 33, .11);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #f9fbf5 0%, var(--bg) 44%, #eef4ec 100%);
      letter-spacing: 0;
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, .92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .topbar-inner {
      max-width: 1240px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--green);
      border-radius: 8px;
      font-weight: 800;
      flex: 0 0 auto;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .brand p {
      margin: 3px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    .summary {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .summary strong {
      color: var(--ink);
      font-size: 18px;
    }

    main {
      max-width: 980px;
      width: 100%;
      margin: 0 auto;
      padding: 18px 20px 22px;
    }

    .start-page {
      min-height: calc(100vh - 70px);
      display: grid;
      place-items: center;
    }

    .start-card {
      width: min(100%, 520px);
      padding: 28px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .start-card h2 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.25;
    }

    .start-card p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .entry-options {
      display: grid;
      gap: 12px;
      margin-bottom: 22px;
    }

    .entry-option {
      width: 100%;
      min-height: 66px;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfa;
      color: var(--ink);
      text-align: left;
      font-weight: 800;
      transition: .16s ease;
    }

    .entry-option::before {
      content: "";
      width: 20px;
      height: 20px;
      border: 2px solid #b9c8b3;
      border-radius: 50%;
      background: #fff;
      box-shadow: inset 0 0 0 5px #fff;
    }

    .entry-option:hover {
      border-color: #b7c8b1;
      background: #f3f8f0;
    }

    .entry-option.active {
      border-color: var(--green);
      background: var(--green-2);
      color: var(--ink);
      box-shadow: 0 10px 24px rgba(79, 143, 69, .14);
    }

    .entry-option.active::before {
      border-color: var(--green);
      background: var(--green);
    }

    .next-button {
      width: 100%;
      min-height: 48px;
      border-radius: 8px;
      background: var(--green);
      color: #fff;
      font-weight: 900;
      font-size: 16px;
      transition: .16s ease;
    }

    .next-button:disabled {
      cursor: not-allowed;
      background: #dfe6da;
      color: #7c897f;
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      align-items: start;
    }

    .hidden {
      display: none !important;
    }

    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .filters {
      position: sticky;
      top: 82px;
      max-height: calc(100vh - 102px);
      overflow: auto;
      padding: 18px;
      scroll-margin-top: 88px;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 16px;
      line-height: 1.35;
    }

    .hint {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .field {
      margin: 0 0 20px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 14px;
    }

    .field-note {
      margin: -2px 0 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .choice-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .choice {
      min-height: 38px;
      border: 1px solid var(--line);
      background: #fbfcfa;
      border-radius: 8px;
      padding: 8px 11px;
      color: var(--ink);
      transition: .16s ease;
    }

    .choice:hover {
      border-color: #b7c8b1;
      background: #f3f8f0;
    }

    .choice.active {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
      box-shadow: 0 8px 18px rgba(79, 143, 69, .24);
    }

    .reset {
      width: 100%;
      height: 42px;
      border-radius: 8px;
      background: #eef2eb;
      color: var(--ink);
      font-weight: 700;
    }

    .wizard {
      min-height: calc(100vh - 108px);
      padding: 22px;
      display: grid;
      align-content: start;
      gap: 16px;
    }

    .wizard-head {
      display: grid;
      gap: 6px;
    }

    .wizard-step {
      color: var(--green);
      font-size: 14px;
      font-weight: 900;
    }

    .wizard-head h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.25;
    }

    .wizard-head p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .wizard-section {
      display: grid;
      gap: 10px;
    }

    .wizard-section h3 {
      margin: 0;
      font-size: 17px;
      line-height: 1.35;
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(138px, 1fr));
      gap: 10px;
    }

    .option-card {
      min-height: 52px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfa;
      color: var(--ink);
      text-align: left;
      display: grid;
      gap: 5px;
      transition: .16s ease;
    }

    .option-card:hover {
      border-color: #b7c8b1;
      background: #f3f8f0;
    }

    .option-card.active {
      border-color: var(--green);
      background: var(--green-2);
      box-shadow: 0 10px 22px rgba(79, 143, 69, .14);
    }

    .option-card strong {
      font-size: 16px;
      line-height: 1.35;
    }

    .option-card span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .course-option-grid {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .wizard-nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 0;
    }

    .wizard-btn {
      min-height: 46px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 900;
      background: #eef2eb;
      color: var(--ink);
    }

    .wizard-btn.primary {
      background: var(--green);
      color: #fff;
    }

    .wizard-btn:disabled {
      cursor: not-allowed;
      background: #dfe6da;
      color: #7c897f;
    }

    .content {
      display: grid;
      gap: 14px;
      scroll-margin-top: 88px;
    }

    .guide {
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      background: #fff;
    }

    .guide h2 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.25;
    }

    .guide p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .count-box {
      min-width: 132px;
      padding: 14px;
      border-radius: 8px;
      background: var(--green-2);
      text-align: center;
    }

    .count-box strong {
      display: block;
      font-size: 32px;
      line-height: 1;
      color: var(--green);
    }

    .count-box span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .interest-strip {
      padding: 16px;
      overflow: hidden;
    }

    .interest-strip .choice-grid {
      max-height: 132px;
      overflow: auto;
      padding-right: 4px;
    }

    .courses {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .course {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .course.focused {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(79, 143, 69, .18), var(--shadow);
    }

    .course.conflict {
      border-color: rgba(200, 72, 60, .45);
      background: #fffafa;
    }

    .course-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }

    .course h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
    }

    .tag {
      flex: 0 0 auto;
      max-width: 108px;
      padding: 5px 8px;
      border-radius: 8px;
      color: var(--green);
      background: var(--green-2);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meta {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .meta strong {
      color: var(--ink);
      font-weight: 700;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .add {
      flex: 1;
      min-height: 42px;
      border-radius: 8px;
      background: var(--green);
      color: #fff;
      font-weight: 800;
    }

    .add.added {
      background: #e5efe1;
      color: var(--green);
    }

    .add.blocked {
      background: #f7e5e2;
      color: var(--red);
    }

    .conflict-note {
      color: var(--red);
      font-size: 13px;
      line-height: 1.45;
    }

    .alternatives {
      display: grid;
      gap: 8px;
      padding: 10px;
      border-radius: 8px;
      background: #fff4f2;
      border: 1px solid rgba(200, 72, 60, .16);
    }

    .alternatives-title {
      color: var(--red);
      font-size: 13px;
      font-weight: 800;
    }

    .alternative {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .alternative strong {
      display: block;
      color: var(--ink);
      font-size: 13px;
    }

    .alt-add {
      min-height: 32px;
      padding: 0 10px;
      border-radius: 8px;
      background: #fff;
      color: var(--green);
      border: 1px solid #c9dcc3;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .empty {
      padding: 36px 20px;
      text-align: center;
      color: var(--muted);
    }

    .plan {
      position: sticky;
      top: 82px;
      padding: 18px;
      max-height: calc(100vh - 102px);
      overflow: auto;
      scroll-margin-top: 88px;
    }

    .plan.plan-full {
      position: static;
      max-height: none;
      overflow: visible;
      width: min(100%, 760px);
      margin: 0 auto;
    }

    .plan-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .plan-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .plan-head-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
    }

    .clear {
      color: var(--muted);
      background: transparent;
      padding: 6px 0;
      font-size: 13px;
    }

    .home-link {
      color: var(--green);
      background: transparent;
      padding: 6px 0;
      font-size: 13px;
      font-weight: 800;
    }

    .notice {
      margin: 0 0 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #f5f7f3;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .selected-list {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .selected {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfa;
    }

    .selected strong {
      display: block;
      font-size: 15px;
      line-height: 1.35;
      margin-bottom: 6px;
    }

    .selected span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .remove {
      margin-top: 8px;
      color: var(--red);
      background: transparent;
      font-size: 13px;
      padding: 0;
    }

    .result-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 0 0 10px;
    }

    .result-btn {
      min-height: 40px;
      border-radius: 8px;
      background: var(--green);
      color: #fff;
      font-weight: 800;
    }

    .result-btn.secondary {
      background: #eef2eb;
      color: var(--ink);
    }

    .result-box {
      display: none;
      margin: 0 0 16px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fbfcfa;
      white-space: pre-wrap;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.6;
    }

    .result-box.show {
      display: block;
    }

    .week {
      display: grid;
      gap: 8px;
    }

    .day {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .day-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 10px;
      background: #f0f5ed;
      font-weight: 800;
    }

    .day-title span {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    .slot {
      padding: 9px 10px;
      border-top: 1px solid var(--line);
      font-size: 13px;
      line-height: 1.45;
    }

    .slot b {
      display: block;
      font-size: 14px;
    }

    .slot em {
      color: var(--muted);
      font-style: normal;
    }

    .slot-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
    }

    .slot-remove {
      min-height: 28px;
      padding: 0 8px;
      border-radius: 8px;
      background: #f7e5e2;
      color: var(--red);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .mobile-nav {
      display: none;
    }

    .course-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: end;
      background: rgba(23, 33, 27, .28);
    }

    .course-modal.open {
      display: flex;
    }

    .course-modal-sheet {
      width: 100%;
      max-height: min(76vh, 680px);
      padding: 16px 16px calc(18px + env(safe-area-inset-bottom));
      border-radius: 16px 16px 0 0;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 -20px 46px rgba(23, 33, 27, .16);
      overflow: auto;
    }

    .course-modal-head {
      position: sticky;
      top: -16px;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 2px 0 12px;
      background: #fff;
    }

    .course-modal-head h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .course-modal-head p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .modal-close {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: #eef2eb;
      color: var(--ink);
      font-size: 22px;
      line-height: 1;
    }

    .modal-course-list {
      display: grid;
      gap: 9px;
    }

    .modal-course {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfa;
      text-align: left;
      color: var(--ink);
    }

    .modal-course strong {
      display: block;
      margin-bottom: 5px;
      font-size: 16px;
      line-height: 1.35;
    }

    .modal-course span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 1080px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .plan {
        position: static;
        max-height: none;
      }
    }

    @media (max-width: 760px) {
      .topbar-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      .summary {
        width: 100%;
        justify-content: space-between;
      }

      main {
        padding: 12px;
      }

      .start-page {
        min-height: calc(100vh - 118px);
      }

      .start-card {
        padding: 20px;
      }

      .start-card h2 {
        font-size: 23px;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .wizard {
        min-height: calc(100vh - 104px);
        padding: 16px;
        gap: 13px;
      }

      .wizard-head h2 {
        font-size: 22px;
      }

      .wizard-head p {
        font-size: 13px;
      }

      .wizard-section h3 {
        font-size: 16px;
      }

      .option-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .course-option-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .option-card {
        min-height: 48px;
        padding: 9px 10px;
      }

      .option-card strong {
        font-size: 15px;
      }

      .option-card span {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .wizard-btn {
        min-height: 44px;
      }

      .filters {
        position: static;
        max-height: none;
      }

      .guide {
        grid-template-columns: 1fr;
      }

      .guide h2 {
        font-size: 21px;
      }

      .courses {
        grid-template-columns: 1fr;
      }

      .mobile-nav {
        display: none;
      }

      .mobile-nav button {
        min-height: 44px;
        border-radius: 8px;
        background: #eef2eb;
        color: var(--ink);
        font-size: 14px;
        font-weight: 800;
      }

      .mobile-nav button.primary {
        background: var(--green);
        color: #fff;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-mark">选</div>
          <div>
            <h1>乐龄学院选课助手</h1>
            <p>2026年春季课表 Demo · 选择入口，再继续选课</p>
          </div>
        </div>
        <div class="summary">
          <span>已选 <strong id="selectedCount">0</strong> 门</span>
          <span>当前显示 <strong id="visibleCount">0</strong> 门</span>
        </div>
      </div>
    </header>

    <main>
      <section class="start-page" id="startPage">
        <div class="start-card">
          <h2>你想怎样选课？</h2>
          <p>先选择一个入口，下一页再继续细选课程。三个选项只能选择一个。</p>
          <div class="entry-options" id="entryOptions" role="radiogroup" aria-label="选课方式">
            <button class="entry-option" type="button" role="radio" aria-checked="false" data-mode="time">按时间选课</button>

      return [...items].sort((a, b) => {
        const dayDiff = weekdays.indexOf(a.weekday) - weekdays.indexOf(b.weekday);
        if (dayDiff) return dayDiff;
        return timeRange(a).start - timeRange(b).start;
      });
    }

    function teacherNames(course) {
      return course.teacher
        .replace(/（.*?）/g, "")
        .split("、")
        .map(name => name.trim())
        .filter(Boolean);
    }

    function departments() {
      return uniqueInOrder(courses.map(course => course.department));
    }

    function interestsByDepartment(department) {
      return uniqueInOrder(courses.filter(course => course.department === department).map(course => course.interest));
    }

    function teachersByDepartment(department) {
      return uniqueInOrder(courses
        .filter(course => course.department === department)
        .flatMap(course => teacherNames(course)))
        .sort((a, b) => a.localeCompare(b, "zh-Hans-CN"));
    }

    function courseHasTeacher(course, teacher) {
      return teacherNames(course).includes(teacher);
    }

    function timeFilteredCourses() {
      const period = periods.find(item => item.key === state.timePeriod);
      if (!state.timeDay || !period) return [];
      return sortCourses(courses.filter(course => (
        course.weekday === state.timeDay && overlaps(timeRange(course), slotRange(period))
      )));
    }

    function interestFilteredCourses() {
      if (!state.department || !state.interest) return [];
      return sortCourses(courses.filter(course => (
        course.department === state.department && course.interest === state.interest
      )));
    }

    function teacherFilteredCourses() {
      if (!state.department || !state.teacher) return [];
      return sortCourses(courses.filter(course => (
        course.department === state.department && courseHasTeacher(course, state.teacher)
      )));
    }

    function addChosenCourseToPlan() {
      const course = selectedCourse();
      if (!course) return;
      state.selected.add(course.id);
      state.showResult = false;
      state.page = "plan";
      window.scrollTo({ top: 0, behavior: "smooth" });
      render();
    }

    function resetRoute(mode = state.entryMode) {
      state.entryMode = mode;
      state.routeStep = 0;
      state.timeDay = "";
      state.timePeriod = "";
      state.department = "";
      state.interest = "";
      state.teacher = "";
      state.chosenCourseId = null;
    }

    function optionButton({ key, title, detail, active, onClick }) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `option-card ${active ? "active" : ""}`;
      button.setAttribute("role", "radio");
      button.setAttribute("aria-checked", String(active));
      button.innerHTML = `<strong>${title}</strong>${detail ? `<span>${detail}</span>` : ""}`;
      button.addEventListener("click", () => onClick(key));
      return button;
    }

    function renderOptionGrid(container, items, selectedKey, onClick, courseMode = false) {
      container.innerHTML = "";
      container.className = `option-grid ${courseMode ? "course-option-grid" : ""}`;
      items.forEach(item => {
        const key = typeof item === "string" ? item : item.key;
        const title = typeof item === "string" ? item : item.title;
        const detail = typeof item === "string" ? "" : item.detail;
        container.appendChild(optionButton({
          key,
          title,
          detail,
          active: String(selectedKey) === String(key),
          onClick
        }));
      });
    }

    function courseOptions(items) {
      return items.map(course => ({
        key: course.id,
        title: course.name,
        detail: `周${course.weekday} ${course.time} · ${course.teacher} · ${course.classroom}`
      }));
    }

    function renderSection(title, id) {
      return `
        <div class="wizard-section">
          <h3>${title}</h3>
          <div id="${id}" role="radiogroup" aria-label="${title}"></div>
        </div>
      `;
    }

    function renderWizardShell({ stepLabel, title, hint, body, nextDisabled = false, nextText = "下一页" }) {
      $("#wizardPanel").innerHTML = `
        <div class="wizard-head">
          <div class="wizard-step">${stepLabel}</div>
          <h2>${title}</h2>
          <p>${hint}</p>
        </div>
        ${body}
        <div class="wizard-nav">
          <button class="wizard-btn" id="wizardBack" type="button">返回上一页</button>
          <button class="wizard-btn primary" id="wizardNext" type="button" ${nextDisabled ? "disabled" : ""}>${nextText}</button>
        </div>
      `;
      $("#wizardBack").addEventListener("click", goBack);
      $("#wizardNext").addEventListener("click", goNext);
    }

    function renderTimeWizard() {
      if (state.routeStep === 0) {
        renderWizardShell({
          stepLabel: "按时间选课",
          title: "选择日期和时间段",
          hint: "日期只能选一个，时间段也只能选一个。选好后进入下一页查看这个时间段的全部课程。",
          body: renderSection("按日期选择", "weekdayChoices") + renderSection("按时间段选择", "periodChoices"),
          nextDisabled: !state.timeDay || !state.timePeriod
        });
        renderOptionGrid($("#weekdayChoices"), weekdays.map(day => ({ key: day, title: `周${day}` })), state.timeDay, key => {
          state.timeDay = key;
          render();
        });
        renderOptionGrid($("#periodChoices"), periods.map(period => ({ key: period.key, title: period.label })), state.timePeriod, key => {
          state.timePeriod = key;
          render();
        });
        return;
      }

      const visible = timeFilteredCourses();
      renderWizardShell({
        stepLabel: "按时间选课",
        title: `周${state.timeDay} ${state.timePeriod} 的课程`,
        hint: "这里仅显示所选日期和时间段内的课程。课程只能单选。",
        body: renderSection("选择一门课程", "courseChoices"),
        nextDisabled: !state.chosenCourseId,
        nextText: "下一页，进入我的课表"
      });
      renderOptionGrid($("#courseChoices"), courseOptions(visible), state.chosenCourseId, key => {
        state.chosenCourseId = Number(key);
        render();
      }, true);
      if (!visible.length) $("#courseChoices").innerHTML = `<div class="empty">这个时间段暂时没有课程，请返回上一页换一个时间。</div>`;
    }

    function renderInterestWizard() {
      if (state.routeStep === 0) {
        renderWizardShell({
          stepLabel: "按兴趣选课",
          title: "先选择系别",
          hint: "系别只能单选。下一页会看到这个系别里的课程名称。",
          body: renderSection("系别", "departmentChoices"),
          nextDisabled: !state.department
        });
        renderOptionGrid($("#departmentChoices"), departments(), state.department, key => {
          state.department = key;
          state.interest = "";
          state.chosenCourseId = null;
          render();
        });
        return;
      }

      if (state.routeStep === 1) {
        renderWizardShell({
          stepLabel: "按兴趣选课",
          title: `${state.department}里的课程名称`,
          hint: "课程名称只能单选。下一页会看到对应的具体班级，例如初级、中级、提高班等。",
          body: renderSection("课程名称", "interestChoices"),
          nextDisabled: !state.interest
        });
        renderOptionGrid($("#interestChoices"), interestsByDepartment(state.department), state.interest, key => {
          state.interest = key;
          state.chosenCourseId = null;
          render();
        });
        return;
      }

      renderWizardShell({
        stepLabel: "按兴趣选课",
        title: `选择「${state.interest}」的具体班级`,
        hint: "这一页只能选择一门具体课程。选好后进入我的课表。",
        body: renderSection("具体课程", "courseChoices"),
        nextDisabled: !state.chosenCourseId,
        nextText: "下一页，进入我的课表"
      });
      renderOptionGrid($("#courseChoices"), courseOptions(interestFilteredCourses()), state.chosenCourseId, key => {
        state.chosenCourseId = Number(key);
        render();
      }, true);
    }

    function renderTeacherWizard() {
      if (state.routeStep === 0) {
        renderWizardShell({
          stepLabel: "按老师选课",
          title: "先选择系别",
          hint: "系别只能单选。点下一页后，再选择这个系别里的老师。",
          body: renderSection("系别", "departmentChoices"),
          nextDisabled: !state.department
        });
        renderOptionGrid($("#departmentChoices"), departments(), state.department, key => {
          state.department = key;
          state.teacher = "";
          state.chosenCourseId = null;
          render();
        });
        return;
      }

      if (state.routeStep === 1) {
        renderWizardShell({
          stepLabel: "按老师选课",
          title: `${state.department}的老师`,
          hint: "老师只能单选。点下一页后，会看到这位老师对应的课程。",
          body: renderSection("老师", "teacherChoices"),
          nextDisabled: !state.teacher
        });
        renderOptionGrid($("#teacherChoices"), teachersByDepartment(state.department), state.teacher, key => {
          state.teacher = key;
          state.chosenCourseId = null;
          render();
        });
        return;
      }

      renderWizardShell({
        stepLabel: "按老师选课",
        title: `${state.teacher}老师的课程`,
        hint: "课程只能单选。选好后进入我的课表。",
        body: renderSection("对应课程", "courseChoices"),
        nextDisabled: !state.chosenCourseId,
        nextText: "下一页，进入我的课表"
      });
      renderOptionGrid($("#courseChoices"), courseOptions(teacherFilteredCourses()), state.chosenCourseId, key => {
        state.chosenCourseId = Number(key);
        render();
      }, true);
    }

    function renderPlanIntro() {
      const course = selectedCourse();
      renderWizardShell({
        stepLabel: "我的课表",
        title: course ? `已加入：${course.name}` : "我的课表",
        hint: course
          ? "课程已经自动加入右侧课表。你可以生成结果、复制文字，也可以返回上一页换一门课。"
          : "右侧是当前课表。你可以继续回到首页选择新的选课方式。",
        body: `<div class="notice">课表生成和复制功能保留在右侧，操作方式与之前一致。</div>`,
        nextText: "回到首页"
      });
    }

    function renderWizard() {
      if (state.page === "plan") return;
      if (state.entryMode === "time") renderTimeWizard();
      if (state.entryMode === "interest") renderInterestWizard();
      if (state.entryMode === "teacher") renderTeacherWizard();
    }

    function renderPlan() {
      const selected = sortCourses(getSelectedCourses());
      $("#selectedCount").textContent = selected.length;
      $("#planNotice").textContent = selected.length
        ? "下面是你当前的选课组合。若有时间冲突，课程卡片会出现红色提醒。"
        : "还没有选择课程。完成选课后，课程会自动加入这里。";

      const selectedList = $("#selectedList");
      selectedList.innerHTML = "";
      selected.forEach(course => {
        const conflict = hasConflict(course, selected);
        const item = document.createElement("div");
        item.className = "selected";
        item.innerHTML = `
          <strong>${course.name}</strong>
          <span>周${course.weekday} ${course.time} · ${course.classroom}</span>
          <span>${course.teacher} · ${course.interest}</span>
          ${conflict ? `<span class="conflict-note">与「${conflict.name}」冲突</span>` : ""}
          <button class="remove">移除</button>
        `;
        item.querySelector(".remove").addEventListener("click", () => {
          state.selected.delete(course.id);
          state.showResult = false;
          render();
        });
        selectedList.appendChild(item);
      });

      const resultBox = $("#resultBox");
      resultBox.textContent = buildResultText(selected);
      resultBox.className = `result-box ${state.showResult ? "show" : ""}`;

      const weekPlan = $("#weekPlan");
      weekPlan.innerHTML = "";
      weekdays.forEach(day => {
        const dayCourses = selected.filter(course => course.weekday === day);
        const dayNode = document.createElement("div");
        dayNode.className = "day";
        dayNode.innerHTML = `
          <div class="day-title">周${day}<span>${dayCourses.length} 门</span></div>
          ${dayCourses.length ? dayCourses.map(course => `
            <div class="slot">
              <div class="slot-row">
                <div>
                  <b>${course.time} ${course.name}</b>
                  <em>${course.classroom} · ${course.interest}</em>
                </div>
                <button class="slot-remove" data-id="${course.id}">删除</button>
              </div>
            </div>
          `).join("") : `<div class="slot"><em>暂未选择</em></div>`}
        `;
        dayNode.querySelectorAll(".slot-remove").forEach(button => {
          button.addEventListener("click", () => {
            state.selected.delete(Number(button.dataset.id));
            state.showResult = false;
            render();
          });
        });
        weekPlan.appendChild(dayNode);
      });
    }

    function buildResultText(selected = sortCourses(getSelectedCourses())) {
      if (!selected.length) return "我的选课清单：\n暂未选择课程。";
      const conflictPairs = new Map();
      selected.forEach(course => {
        const conflict = hasConflict(course, selected);
        if (!conflict) return;
        const key = [course.id, conflict.id].sort((a, b) => a - b).join("-");
        if (!conflictPairs.has(key)) conflictPairs.set(key, `${course.name} 与 ${conflict.name} 时间冲突`);
      });
      const conflictLines = [...conflictPairs.values()];
      const lines = selected.map((course, index) => (
        `${index + 1}. ${course.name}：周${course.weekday} ${course.time}，${course.classroom}，教师：${course.teacher}`
      ));
      return [
        "我的选课清单：",
        ...lines,
        "",
        conflictLines.length ? "时间提醒：\n" + conflictLines.join("\n") : "当前无时间冲突。"
      ].join("\n");
    }

    function renderStartPage() {
      $("#startPage").classList.toggle("hidden", state.page !== "start");
      $("#workspace").classList.toggle("hidden", state.page === "start");
      $("#wizardPanel").classList.toggle("hidden", state.page === "start" || state.page === "plan");
      $("#planPanel").classList.toggle("hidden", state.page !== "plan");
      document.querySelector(".summary").classList.add("hidden");
      $("#nextPage").disabled = !state.entryMode;
      document.querySelectorAll(".entry-option").forEach(button => {
        const active = button.dataset.mode === state.entryMode;
        button.classList.toggle("active", active);
        button.setAttribute("aria-checked", String(active));
      });
    }

    function render() {
      renderStartPage();
      if (state.page !== "start") renderWizard();
      renderPlan();
      $("#visibleCount").textContent = state.page === "start" ? courses.length : visibleCountForRoute();
    }

    document.querySelectorAll(".entry-option").forEach(button => {
      button.addEventListener("click", () => {
        state.entryMode = button.dataset.mode;
        renderStartPage();
      });
    });

    $("#nextPage").addEventListener("click", () => {
      if (!state.entryMode) return;
      resetRoute(state.entryMode);
      state.page = "wizard";
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    function visibleCountForRoute() {
      if (state.page === "plan") return getSelectedCourses().length;
      if (state.entryMode === "time" && state.routeStep === 1) return timeFilteredCourses().length;
      if (state.entryMode === "interest" && state.routeStep === 2) return interestFilteredCourses().length;
      if (state.entryMode === "teacher" && state.routeStep === 2) return teacherFilteredCourses().length;
      return courses.length;
    }

    function goBack() {
      if (state.page === "plan") {
        state.page = "wizard";
        render();
        return;
      }

      if (state.routeStep > 0) {
        state.routeStep -= 1;
        state.chosenCourseId = null;
        if (state.entryMode === "interest" && state.routeStep < 1) state.interest = "";
        if (state.entryMode === "teacher" && state.routeStep < 1) state.teacher = "";
        render();
        return;
      }

      state.page = "start";
      render();
    }

    function goNext() {
      if (state.page === "plan") {
        state.page = "start";
        resetRoute("");
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
        return;
      }

      if (state.entryMode === "time") {
        if (state.routeStep === 0 && state.timeDay && state.timePeriod) {
          state.routeStep = 1;
          state.chosenCourseId = null;
          render();
          return;
        }
        if (state.routeStep === 1 && state.chosenCourseId) addChosenCourseToPlan();
        return;
      }

      if (state.entryMode === "interest") {
        if (state.routeStep === 0 && state.department) {
          state.routeStep = 1;
          state.interest = "";
          state.chosenCourseId = null;
          render();
          return;
        }
        if (state.routeStep === 1 && state.interest) {
          state.routeStep = 2;
          state.chosenCourseId = null;
          render();
          return;
        }
        if (state.routeStep === 2 && state.chosenCourseId) addChosenCourseToPlan();
        return;
      }

      if (state.entryMode === "teacher") {
        if (state.routeStep === 0 && state.department) {
          state.routeStep = 1;
          state.teacher = "";
          state.chosenCourseId = null;
          render();
          return;
        }
        if (state.routeStep === 1 && state.teacher) {
          state.routeStep = 2;
          state.chosenCourseId = null;
          render();
          return;
        }
        if (state.routeStep === 2 && state.chosenCourseId) addChosenCourseToPlan();
      }
    }

    $("#clearPlan").addEventListener("click", () => {
      state.selected.clear();
      state.showResult = false;
      render();
    });

    $("#backHomeFromPlan").addEventListener("click", () => {
      state.page = "start";
      resetRoute("");
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    $("#generateResult").addEventListener("click", () => {
      state.showResult = true;
      renderPlan();
    });

    $("#copyResult").addEventListener("click", async () => {
      const text = buildResultText();
      state.showResult = true;
      renderPlan();
      try {
        await navigator.clipboard.writeText(text);
        $("#copyResult").textContent = "已复制";
        setTimeout(() => { $("#copyResult").textContent = "复制文字"; }, 1200);
      } catch (error) {
        $("#copyResult").textContent = "请手动复制";
        setTimeout(() => { $("#copyResult").textContent = "复制文字"; }, 1400);
      }
    });

    render();
  </script>
</body>
</html>
